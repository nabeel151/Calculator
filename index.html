<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title> Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-black flex items-center justify-center h-screen">

    <div class="bg-gray-900 w-70 rounded-2xl p-5 shadow-2xl">

        <!-- Display -->
        <div class="text-right mb-40">
            <div  id ="expression"class="text-gray-400 text-lg">0</div>
            <div id ="result"class="text-white text-4xl font-bold">0</div>
        </div>

        <!-- Buttons -->
        <div class="grid grid-cols-4 gap-3">

            <!-- Top Row -->
            <button  onclick="clearAll()"  class="bg-gray-600 text-white p-4 rounded-xl">C</button>
            <button  onclick="deleteLast()"  class="bg-gray-600 text-white p-4 rounded-xl">⌫</button>
            <button onclick="append('/')" class="bg-green-600 text-white p-4 rounded-xl">/</button>
            <button onclick="append('*')" class="bg-green-600 text-white p-4 rounded-xl">*</button>

            <!-- Numbers -->
            <button onclick="append('7')" class="bg-gray-800 text-green-400 p-4 rounded-xl">7</button>
            <button onclick="append('8')" class="bg-gray-800 text-green-400 p-4 rounded-xl">8</button>
            <button onclick="append('9')" class="bg-gray-800 text-green-400 p-4 rounded-xl">9</button>
            <button onclick="append('-')" class="bg-green-600 text-white p-4 rounded-xl">-</button>

            <button onclick="append('4')" class="bg-gray-800 text-green-400 p-4 rounded-xl">4</button>
            <button onclick="append('5')" class="bg-gray-800 text-green-400 p-4 rounded-xl">5</button>
            <button onclick="append('6')" class="bg-gray-800 text-green-400 p-4 rounded-xl">6</button>
            <button onclick="append('+')"
                class="bg-green-600 text-white p-4 rounded-xl row-span-2 flex items-center justify-center text-xl">+</button>

            <button onclick="append('1') " class="bg-gray-800 text-green-400 p-4 rounded-xl">1</button>
            <button onclick="append('2')" class="bg-gray-800 text-green-400 p-4 rounded-xl">2</button>
            <button onclick="append('3')" class="bg-gray-800 text-green-400 p-4 rounded-xl">3</button>

            <!-- Bottom -->
            <button onclick="append('0')" class="bg-gray-800 text-green-400 p-4 rounded-xl col-span-2">0</button>
            <button onclick="append('.')" class="bg-gray-800 text-green-400 p-4 rounded-xl">.</button>
            <button onclick="calculate()" class="bg-green-600 text-white p-4 rounded-xl row-span-1 flex items-center justify-center text-xl">=</button>

        </div>

    </div>
<script src="cal.js"></script>
</body>

</html>
